<!doctype html>
<html lang="en">
  <head>
    <script type="module">
      import { injectIntoGlobalHook } from "/@react-refresh";
      injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
      window.__vite_plugin_react_preamble_installed__ = true;
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CIY - Cook It Yourself</title>
    <link rel="manifest" href="/manifest.json?v=3" />
    <meta name="theme-color" content="#00A82D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CIY" />
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/icons/png?seed=ciy&backgroundColor=00A82D&icon=basket" />
    <link rel="icon" type="image/png" href="https://api.dicebear.com/7.x/icons/png?seed=ciy&backgroundColor=00A82D&icon=basket" />
    <script>
      // Global error handling
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Global Error:', msg, 'at', url, ':', lineNo, ':', columnNo, error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('Unhandled Rejection:', event.reason);
      };

      // Register a simple service worker for PWA installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('ServiceWorker registered:', reg.scope);
          }).catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }

      // Debug PWA Installability
      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('✅ PWA Install Prompt is ready!');
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
